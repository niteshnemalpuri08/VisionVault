<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Performance - Student Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.3s ease;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .subjects-table-container {
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 12px;
        }

        .subjects-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
            background: rgba(255, 255, 255, 0.03);
        }

        .subjects-table thead th {
            text-align: left;
            padding: 12px 16px;
            font-weight: 700;
            font-size: 0.95em;
            color: #e6e6e6;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
        }

        .subjects-table tbody td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: middle;
            color: #fff;
        }

        .subjects-table tbody tr:hover {
            background: rgba(255,255,255,0.05);
            transition: background 0.3s ease;
        }

        .subject-name-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .grade-badge {
            padding: 6px 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85em;
            display: inline-block;
            text-align: center;
            min-width: 35px;
        }

        .grade-badge.excellent { 
            background: linear-gradient(135deg, #4CAF50, #45a049);
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }
        
        .grade-badge.good { 
            background: linear-gradient(135deg, #2196F3, #1976D2);
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.3);
        }
        
        .grade-badge.average { 
            background: linear-gradient(135deg, #FF9800, #F57C00);
            box-shadow: 0 2px 8px rgba(255, 152, 0, 0.3);
        }
        
        .grade-badge.poor { 
            background: linear-gradient(135deg, #f44336, #d32f2f);
            box-shadow: 0 2px 8px rgba(244, 67, 54, 0.3);
        }

        .trend-up { 
            color: #4caf50; 
            font-weight: 700;
        }
        
        .trend-stable { 
            color: #ffb300; 
            font-weight: 700;
        }
        
        .trend-down { 
            color: #f44336; 
            font-weight: 700;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 2em;
            font-weight: 700;
        }

        .stat-card p {
            margin: 0;
            opacity: 0.9;
            font-size: 0.9em;
        }

        @media (max-width: 720px) {
            .subjects-table {
                min-width: 600px;
            }
            
            .container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>

        <div class="header">
            <h1>📚 Subject Performance</h1>
            <p>Track your performance across all subjects</p>
        </div>

        <div class="stats-summary" id="statsSummary">
            <!-- Stats will be inserted here -->
        </div>

        <div class="subjects-table-container">
            <table class="subjects-table" id="subjectsTable">
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Overall Score</th>
                        <th>Assignments</th>
                        <th>Exams</th>
                        <th>Trend</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Subject rows will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="../auth.js"></script>
    <script>
        // CONSISTENT DATA - Same across ALL pages
        const STUDENT_DATA = {
            user: {
                username: 'student_demo',
                roll: '24cse001',
                name: 'Demo Student',
                class: '12th Grade'
            },
            subjects: [
                {
                    name: 'Mathematics',
                    grade: 'A',
                    score: 92,
                    attendance: 95,
                    assignments: 90,
                    exams: 92,
                    trend: 'up'
                },
                {
                    name: 'Physics',
                    grade: 'B+',
                    score: 87,
                    attendance: 90,
                    assignments: 85,
                    exams: 87,
                    trend: 'up'
                },
                {
                    name: 'Chemistry',
                    grade: 'A-',
                    score: 89,
                    attendance: 92,
                    assignments: 88,
                    exams: 89,
                    trend: 'stable'
                },
                {
                    name: 'Computer Science',
                    grade: 'A',
                    score: 95,
                    attendance: 98,
                    assignments: 93,
                    exams: 95,
                    trend: 'up'
                },
                {
                    name: 'English',
                    grade: 'B',
                    score: 82,
                    attendance: 88,
                    assignments: 80,
                    exams: 82,
                    trend: 'stable'
                },
                {
                    name: 'Physical Education',
                    grade: 'A-',
                    score: 91,
                    attendance: 100,
                    assignments: 89,
                    exams: 91,
                    trend: 'up'
                }
            ]
        };

        document.addEventListener('DOMContentLoaded', function() {
            loadSubjectData();
        });

        async function loadSubjectData() {
            let subjectsData = STUDENT_DATA.subjects;

            if (window.authManager) {
                const user = (window.authManager && authManager.getUser()) || JSON.parse(localStorage.getItem('user') || '{}');
                if (user && user.roll) {
                    try {
                        const r = await authManager.apiCall(`/api/internal-marks?student_roll=${user.roll}`);
                        if (r.ok) {
                            const marks = await r.json();
                            // Aggregate marks by subject
                            const bySubject = {};
                            marks.forEach(m => {
                                if (!bySubject[m.subject]) bySubject[m.subject] = {scores: [], attendance: 0};
                                bySubject[m.subject].scores.push(m.marks);
                            });

                            const newSubjects = Object.keys(bySubject).map(subject => {
                                const scores = bySubject[subject].scores;
                                const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
                                return {
                                    name: subject,
                                    score: avg,
                                    grade: calculateGradeFromScore(avg),
                                    attendance: 0,
                                    assignments: '-',
                                    exams: '-',
                                    trend: 'stable'
                                };
                            });

                            if (newSubjects.length) subjectsData = newSubjects;
                        }
                    } catch (err) {
                        console.warn('Could not fetch internal marks:', err);
                    }
                }
            }

            renderStats(subjectsData);
            renderSubjects(subjectsData);
        }

        function calculateGradeFromScore(score) {
            if (score >= 90) return 'A';
            if (score >= 85) return 'A-';
            if (score >= 80) return 'B+';
            if (score >= 75) return 'B';
            if (score >= 70) return 'C+';
            if (score >= 60) return 'C';
            return 'D';
        }

        function renderStats(subjectsData) {
            // Calculate accurate average from core academic subjects (excluding PE)
            const coreSubjects = subjectsData.filter(s => s.name !== 'Physical Education');
            const avgScore = Math.round(
                coreSubjects.reduce((sum, s) => sum + s.score, 0) / coreSubjects.length * 10
            ) / 10;
            
            const avgAttendance = Math.round(
                subjectsData.reduce((sum, s) => sum + s.attendance, 0) / subjectsData.length
            );
            
            const improving = subjectsData.filter(s => s.trend === 'up').length;

            const statsSummary = document.getElementById('statsSummary');
            statsSummary.innerHTML = `
                <div class="stat-card">
                    <h3>${avgScore}%</h3>
                    <p>Average Score</p>
                </div>
                <div class="stat-card">
                    <h3>${avgAttendance}%</h3>
                    <p>Average Attendance</p>
                </div>
                <div class="stat-card">
                    <h3>${improving}</h3>
                    <p>Improving Subjects</p>
                </div>
            `;
        }

        function renderSubjects(subjectsData) {
            const tbody = document.querySelector('#subjectsTable tbody');
            tbody.innerHTML = '';

            subjectsData.forEach(subject => {
                const tr = document.createElement('tr');

                // Subject name + grade badge
                const nameTd = document.createElement('td');
                const nameContainer = document.createElement('div');
                nameContainer.className = 'subject-name-cell';
                
                const nameSpan = document.createElement('span');
                nameSpan.textContent = subject.name;
                
                const badge = document.createElement('span');
                badge.className = `grade-badge ${getGradeClass(subject.score)}`;
                badge.textContent = subject.grade;
                
                nameContainer.appendChild(nameSpan);
                nameContainer.appendChild(badge);
                nameTd.appendChild(nameContainer);

                // Score
                const scoreTd = document.createElement('td');
                scoreTd.textContent = subject.score + '%';

                // Assignments
                const assignTd = document.createElement('td');
                assignTd.textContent = (subject.assignments != null ? subject.assignments + '%' : '-');

                // Exams
                const examsTd = document.createElement('td');
                examsTd.textContent = (subject.exams != null ? subject.exams + '%' : '-');

                // Trend
                const trendTd = document.createElement('td');
                const trendInfo = getTrendInfo(subject.trend);
                trendTd.textContent = trendInfo.text;
                trendTd.className = trendInfo.class;

                tr.appendChild(nameTd);
                tr.appendChild(scoreTd);
                tr.appendChild(assignTd);
                tr.appendChild(examsTd);
                tr.appendChild(trendTd);

                tbody.appendChild(tr);
            });
        }

        function getGradeClass(score) {
            if (score >= 90) return 'excellent';
            if (score >= 80) return 'good';
            if (score >= 70) return 'average';
            return 'poor';
        }

        function getTrendInfo(trend) {
            const trends = {
                'up': { text: '↗️ Improving', class: 'trend-up' },
                'stable': { text: '➡️ Stable', class: 'trend-stable' },
                'down': { text: '↘️ Declining', class: 'trend-down' }
            };
            return trends[trend] || trends['stable'];
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
