<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Records - Student Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .attendance-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .summary-item h3 {
            margin: 0 0 10px 0;
            font-size: 2em;
            font-weight: 600;
        }

        .summary-item p {
            margin: 0;
            opacity: 0.8;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .subject-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            transition: transform 0.3s ease;
        }

        .subject-card:hover {
            transform: translateY(-5px);
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .subject-name {
            font-size: 1.3em;
            font-weight: 600;
        }

        .attendance-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .attendance-badge.excellent { background: linear-gradient(135deg, #4CAF50, #45a049); }
        .attendance-badge.good { background: linear-gradient(135deg, #2196F3, #1976D2); }
        .attendance-badge.average { background: linear-gradient(135deg, #FF9800, #F57C00); }
        .attendance-badge.poor { background: linear-gradient(135deg, #f44336, #d32f2f); }

        .subject-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 600;
            display: block;
        }

        .stat-label {
            opacity: 0.8;
            font-size: 0.9em;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            height: 8px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .subject-details {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>

        <div class="header">
            <h1>📊 Attendance Records</h1>
            <p>Track your attendance history and patterns</p>
        </div>

        <div class="attendance-summary">
            <div class="summary-item">
                <h3 id="totalClasses">0</h3>
                <p>Total Classes</p>
            </div>
            <div class="summary-item">
                <h3 id="presentClasses">0</h3>
                <p>Present Classes</p>
            </div>
            <div class="summary-item">
                <h3 id="absentClasses">0</h3>
                <p>Absent Classes</p>
            </div>
            <div class="summary-item">
                <h3 id="attendancePercent">0%</h3>
                <p>Attendance Rate</p>
            </div>
        </div>

        <div class="subjects-grid" id="subjectsGrid">
            <!-- Subject attendance cards will be populated here -->
        </div>
    </div>

    <script>
        // CONSISTENT DATA - Same across ALL pages
        const STUDENT_DATA = {
            user: {
                username: 'student_demo',
                roll: '24cse001',
                name: 'Demo Student',
                class: '12th Grade'
            },
            subjects: [
                { name: 'Mathematics', attendance: 95, present: 19, total: 20 },
                { name: 'Physics', attendance: 90, present: 18, total: 20 },
                { name: 'Chemistry', attendance: 92, present: 18, total: 20 },
                { name: 'Computer Science', attendance: 98, present: 20, total: 20 },
                { name: 'English', attendance: 88, present: 18, total: 20 },
                { name: 'Physical Education', attendance: 100, present: 20, total: 20 }
            ]
        };

        document.addEventListener('DOMContentLoaded', function() {
            loadAttendanceData();
        });

        async function loadAttendanceData() {
            // Prefer backend data when available
            const user = (window.authManager && authManager.getUser()) || JSON.parse(localStorage.getItem('user') || '{}');
            if (user && user.username) {
                try {
                    const studentResp = await authManager.apiCall(`/api/students/username/${user.username}`);
                    const studentData = await studentResp.json();

                    // Try per-subject attendance rows first
                    if (studentData.roll) {
                        const saResp = await authManager.apiCall(`/api/subject-attendance?student_roll=${studentData.roll}`);
                        const saRows = await saResp.json();
                        if (Array.isArray(saRows) && saRows.length > 0) {
                            // Convert rows into subject cards format
                            const subjects = saRows.map(r => ({
                                name: r.subject || r.name || 'Unknown',
                                attendance: Math.round(r.attendance || r.attendance_percentage || r.attendance_percentage || 0),
                                present: r.attended_classes || r.present || 0,
                                total: r.total_classes || r.total || 10
                            }));

                            // Update totals
                            renderSubjectCards(subjects);

                            let totalClasses = subjects.reduce((s, x) => s + x.total, 0);
                            let totalPresent = subjects.reduce((s, x) => s + x.present, 0);
                            document.getElementById('totalClasses').textContent = totalClasses;
                            document.getElementById('presentClasses').textContent = totalPresent;
                            document.getElementById('absentClasses').textContent = totalClasses - totalPresent;
                            document.getElementById('attendancePercent').textContent = Math.round((totalPresent / totalClasses) * 100) + '%';
                            return;
                        }
                    }

                    // If no per-subject rows, use studentData.attendance to generate subjects
                    if (typeof studentData.attendance === 'number') {
                        renderSubjectAttendance(studentData.attendance);
                        return;
                    }
                } catch (e) {
                    console.warn('Could not fetch attendance from backend, falling back to mock:', e);
                }
            }

            // Fallback to mock data
            const subjects = STUDENT_DATA.subjects;
            renderSubjectCards(subjects);

            let totalClasses = 0;
            let totalPresent = 0;
            subjects.forEach(subject => { totalClasses += subject.total; totalPresent += subject.present; });
            document.getElementById('totalClasses').textContent = totalClasses;
            document.getElementById('presentClasses').textContent = totalPresent;
            document.getElementById('absentClasses').textContent = totalClasses - totalPresent;
            document.getElementById('attendancePercent').textContent = Math.round((totalPresent / totalClasses) * 100) + '%';
        }

        function renderSubjectCards(subjects) {
            const container = document.getElementById('subjectsGrid');
            container.innerHTML = '';

            subjects.forEach(subject => {
                const absent = subject.total - subject.present;
                const percent = subject.attendance;
                
                let attendanceClass = 'excellent';
                if (percent >= 90) attendanceClass = 'excellent';
                else if (percent >= 80) attendanceClass = 'good';
                else if (percent >= 70) attendanceClass = 'average';
                else attendanceClass = 'poor';

                const card = document.createElement('div');
                card.className = 'subject-card';
                card.innerHTML = `
                    <div class="subject-header">
                        <div class="subject-name">${subject.name}</div>
                        <div class="attendance-badge ${attendanceClass}">${percent}%</div>
                    </div>

                    <div class="subject-stats">
                        <div class="stat-item">
                            <span class="stat-value">${subject.present}</span>
                            <span class="stat-label">Present</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">${absent}</span>
                            <span class="stat-label">Absent</span>
                        </div>
                    </div>

                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percent}%"></div>
                    </div>

                    <div class="subject-details">
                        <div class="detail-item">
                            <span>Total Classes:</span>
                            <span>${subject.total}</span>
                        </div>
                        <div class="detail-item">
                            <span>Attendance Rate:</span>
                            <span>${percent}%</span>
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
