name: Smoke tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build DB
        run: |
          python -m backend.json_to_sql
      - name: Start server
        run: |
          nohup python -m backend.server &
          # wait until server responds (timeout ~30s)
          for i in {1..30}; do
            if curl -sSf "http://127.0.0.1:5000/" > /dev/null; then
              echo "Server is up"
              break
            fi
            sleep 1
          done
      - name: Run smoke tests
        run: |
          python -m backend.scripts.run_smoke_tests
      - name: Run update tests
        run: |
          python -m backend.scripts.test_updates || true
